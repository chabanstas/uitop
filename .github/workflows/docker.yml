name: Tests in Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    name: Run API Tests in Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build and run API tests
        run: docker compose up --build --exit-code-from api-tests api-tests

      - name: Upload API report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 30

  e2e-tests:
    name: Run E2E Tests in Docker
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Verify BASE_URL is set
        run: |
          echo "BASE_URL value: '$BASE_URL'"
          if [ -z "$BASE_URL" ]; then
            echo "ERROR: BASE_URL secret is not set or empty"
            exit 1
          fi
          if [[ "$BASE_URL" != http://* ]] && [[ "$BASE_URL" != https://* ]]; then
            echo "ERROR: BASE_URL does not start with http:// or https:// — check for surrounding quotes in the secret value"
            exit 1
          fi
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Build and run E2E tests
        run: docker compose up --build --exit-code-from e2e-tests e2e-tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload E2E report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: playwright-report/
          retention-days: 30
